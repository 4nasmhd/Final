<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — ProLedge</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #081120;
      color: #f2f6fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }
    .wrap { position: relative; z-index: 1; }
    .glow {
      position: fixed; top: 50%; left: 50%;
      width: 640px; height: 640px; transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(74,144,226,0.14), transparent 62%);
      pointer-events: none; z-index: 0;
    }
    .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; }
    .logo span { color: #4a90e2; }
    h1 {
      font-size: clamp(80px, 18vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(120deg, #4a90e2, #cfe3ff 55%, #6faaf5);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 { font-size: clamp(18px, 3vw, 24px); font-weight: 600; margin-top: 12px; }
    p { color: #8195b3; font-size: 15px; margin: 16px auto 32px; max-width: 380px; line-height: 1.7; }
    a.btn {
      display: inline-block;
      background: linear-gradient(135deg, #5b9cf0, #3674c4); color: #ffffff; text-decoration: none;
      font-weight: 700; font-size: 14px;
      padding: 14px 28px; border-radius: 100px;
      transition: filter .25s ease, transform .25s ease;
      box-shadow: 0 8px 24px rgba(54,116,196,0.4);
    }
    a.btn:hover { filter: brightness(1.12); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="logo">Pro<span>Ledge</span></div>
    <h1>404</h1>
    <h2>This page is still in the making.</h2>
    <p>The page you're looking for isn't here yet — but something better is on the way.</p>
    <a class="btn" href="./">Back to ProLedge</a>
  </div>
</body>
</html>
